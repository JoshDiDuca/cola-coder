# Tiny model: ~50M parameters
# Purpose: Fast experimentation - trains in ~2 days on RTX 4080
# Use this to verify everything works before scaling up

model:
  vocab_size: 32768
  dim: 512
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  ffn_dim_multiplier: 2.667
  max_seq_len: 1024
  dropout: 0.1
  rope_theta: 10000.0

training:
  batch_size: 16
  gradient_accumulation: 2  # effective batch = 16 * 2 = 32 (same as before)
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 500
  max_steps: 20000
  weight_decay: 0.1
  grad_clip: 1.0
  precision: "bf16"
  gradient_checkpointing: false

data:
  dataset: "bigcode/starcoderdata"
  languages: ["typescript", "javascript"]
  max_tokens_per_file: 2048
  data_dir: "./data"
  num_workers: 4

checkpoint:
  save_every: 1000
  output_dir: "./checkpoints/tiny"
  max_checkpoints: 5
