# Small model: ~125M parameters
# Purpose: Serious single-GPU training
# This is the primary training target for local development
# VRAM estimate: ~10.5 GB (batch=12, RTX 4080 16GB)

model:
  vocab_size: 32768
  dim: 768
  n_layers: 12
  n_heads: 12
  n_kv_heads: 4
  ffn_dim_multiplier: 2.667
  max_seq_len: 2048
  dropout: 0.1
  rope_theta: 10000.0

training:
  batch_size: 12
  gradient_accumulation: 1  # no accumulation — estimated ~10.5 GB on 17 GB GPU
  learning_rate: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 1000
  max_steps: 100000
  weight_decay: 0.1
  grad_clip: 1.0
  precision: "bf16"
  gradient_checkpointing: false

data:
  dataset: "bigcode/starcoderdata"
  languages: ["typescript", "javascript"]
  max_tokens_per_file: 4096
  data_dir: "./data"
  num_workers: 8

checkpoint:
  save_every: 5000
  output_dir: "./checkpoints/small"
  max_checkpoints: 5
