# Storage configuration for Cola-Coder.
# Change these paths to store data on a different drive.
# All paths can be absolute (D:/ml-data/cola-coder/) or relative to project root.

# storage:
#   data_dir: "./data"                    # Training data (raw + processed)
#   checkpoints_dir: "./checkpoints"      # Model checkpoints (safetensors)
#   tokenizer_path: "./tokenizer.json"    # Trained BPE tokenizer
#   cache_dir: "./cache"                  # HuggingFace download cache

# Example: Store everything on D: drive
storage:
  data_dir: "E:/cola-coder-data/data"
  checkpoints_dir: "E:/cola-coder-data/checkpoints"
  tokenizer_path: "E:/cola-coder-data/tokenizer.json"
  cache_dir: "E:/cola-coder-data/cache"

# storage:
#   data_dir: "E:/ml-data/cola-coder/"                    # Training data (raw + processed)
#   checkpoints_dir: "E:/ml-data/cola-coder/checkpoints"      # Model checkpoints (safetensors)
#   tokenizer_path: "E:/ml-data/cola-coder/tokenizer.json"    # Trained BPE tokenizer
#   cache_dir: "E:/ml-data/cola-coder/cache"                  # HuggingFace download cache