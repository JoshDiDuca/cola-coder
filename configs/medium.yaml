# Medium model: ~350M parameters
# Purpose: Best results achievable on a single consumer GPU
# Requires gradient checkpointing on 16GB VRAM cards
# VRAM estimate: ~9 GB (batch=4, grad_ckpt=true, RTX 4080 16GB)

model:
  vocab_size: 32768
  dim: 1024
  n_layers: 24
  n_heads: 16
  n_kv_heads: 4
  ffn_dim_multiplier: 2.667
  max_seq_len: 2048
  dropout: 0.05
  rope_theta: 10000.0

training:
  batch_size: 4
  gradient_accumulation: 4  # effective batch = 16, better GPU utilization than batch=2
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 2000
  max_steps: 200000
  weight_decay: 0.1
  grad_clip: 1.0
  precision: "bf16"
  gradient_checkpointing: true  # REQUIRED at this size on 16GB

data:
  dataset: "bigcode/starcoderdata"
  languages: ["python", "typescript", "javascript", "java", "go", "rust", "c", "cpp"]
  max_tokens_per_file: 4096
  data_dir: "./data"
  num_workers: 8

checkpoint:
  save_every: 5000
  output_dir: "./checkpoints/medium"
  max_checkpoints: 3
